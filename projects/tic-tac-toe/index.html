<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>TIC TAC TOE</h1>

    <div class="game-container">
        <div id="r11" class="cell" onclick="play()" style="border-left: none; border-top: none;"></div>
        <div id="r12" class="cell" onclick="play()" style="border-top: none; border-right: none;"></div>
        <div id="r13" class="cell" onclick="play()" style="border-top: none; border-right: none;"></div>
        <div id="r21" class="cell" onclick="play()" style="border-left: none; border-bottom: none;"></div>
        <div id="r22" class="cell" onclick="play()" style="border: none;"></div>
        <div id="r23" class="cell" onclick="play()" style="border-right: none; border-bottom: none;"></div>
        <div id="r31" class="cell" onclick="play()" style="border-left: none; border-bottom: none;"></div>
        <div id="r32" class="cell" onclick="play()" style="border-bottom: none; border-right: none;"></div>
        <div id="r33" class="cell" onclick="play()" style="border-bottom: none; border-right: none;"></div>
    </div>

    <button class="reset-button" onclick="reset()">Reset Game</button>

    <script src="script.js"></script>
</body>
</html>
