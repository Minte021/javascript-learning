<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
</head>
<body>
    <div class="mainContainer">
        <div class="screenArea">
            <input type="text" id="screen" disabled>
        </div>
        <div class="btn-container">
            <button>C</button>
            <button>/</button>
            <button>*</button>
            <button>del</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>-</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>+</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button span="2">=</button>
            <button>%</button>
            <button>0</button>
            <button>.</button>
            
            
        </div>
    </div>
</body>
</html>
