<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="whole-screen">
    <div class="mainContainer">
        <div class="screenArea">
            <input type="text" id="screen" disabled>
        </div>
        <div class="btn-container">
            <button class="operators" onclick="clearScreen()">C</button>
            <button class="operators" onclick="addToScreen('/')">/</button>
            <button class="operators" onclick="addToScreen('*')">*</button>
            <button class="operators" onclick="deleteLast()">del</button>
            <button class="nums" onclick="addToScreen('7')">7</button>
            <button class="nums" onclick="addToScreen('8')">8</button>
            <button class="nums" onclick="addToScreen('9')">9</button>
            <button class="operators" onclick="addToScreen('-')">-</button>
            <button class="nums" onclick="addToScreen('4')">4</button>
            <button class="nums" onclick="addToScreen('5')">5</button>
            <button class="nums" onclick="addToScreen('6')">6</button>
            <button class="operators" onclick="addToScreen('+')">+</button>
            <button class="nums" onclick="addToScreen('1')">1</button>
            <button class="nums" onclick="addToScreen('2')">2</button>
            <button class="nums" onclick="addToScreen('3')">3</button>
            <button class="operators" span="2" id="equal-sign" onclick="calculate()">=</button>
            <button class="operators" onclick="calculatePercent()">%</button>
            <button class="nums" onclick="addToScreen('0')">0</button>
            <button class="operators" onclick="addToScreen('.')">.</button>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
