<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter</title>
  </head>
  <body>
    <h1>Counter</h1>
    <p id="count">0</p>

    <button id="add" onclick="countUp()">+</button>
    <button id="sub" onclick="countDown()">-</button>
    <button id="reset" onclick="reset()">Reset</button>

    <script src="script.js"></script>
  </body>
</html>
